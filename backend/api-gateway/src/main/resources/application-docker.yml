spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

server:
  port: ${PORT:8080}

grpc:
  client:
    wallet-service:
      address: static://${WALLET_SERVICE_ADDRESS:wallet-service:9091}
      negotiationType: plaintext
    transaction-service:
      address: static://${TRANSACTION_SERVICE_ADDRESS:transaction-service:9092}
      negotiationType: plaintext
    blockchain-service:
      address: static://${BLOCKCHAIN_SERVICE_ADDRESS:blockchain-service:9093}
      negotiationType: plaintext

cors:
  allowed-origins: ${CORS_ORIGINS:https://*.up.railway.app,http://localhost:3000,http://localhost:5173}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
    
management:
  health:
    defaults:
      enabled: false
    ping:
      enabled: true
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,ping
  endpoint:
    health:
      probes:
        enabled: false
      show-details: never

logging:
  level:
    com.wallet: DEBUG
    net.devh.boot.grpc: INFO

server:
  port: 8091

spring:
  application:
    name: wallet-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wallet_db}
    username: ${DB_USERNAME:wallet_user}
    password: ${DB_PASSWORD:wallet_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

grpc:
  server:
    port: 9091

wallet:
  encryption:
    secret-key: ${WALLET_ENCRYPTION_KEY:your-256-bit-secret-key-here-32ch}
  
logging:
  level:
    com.blockchain: DEBUG
    org.web3j: INFO

server:
  port: 8092

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wallet_db}
    username: ${DB_USERNAME:wallet_user}
    password: ${DB_PASSWORD:wallet_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

grpc:
  server:
    port: 9092
  client:
    wallet-service:
      address: static://${WALLET_SERVICE_HOST:localhost}:${WALLET_SERVICE_GRPC_PORT:9091}
      negotiationType: plaintext
    blockchain-service:
      address: static://${BLOCKCHAIN_SERVICE_HOST:localhost}:${BLOCKCHAIN_SERVICE_GRPC_PORT:9093}
      negotiationType: plaintext

blockchain:
  ethereum:
    mainnet-rpc: ${ETH_MAINNET_RPC:https://mainnet.infura.io/v3/your-api-key}
    sepolia-rpc: ${ETH_SEPOLIA_RPC:https://sepolia.infura.io/v3/your-api-key}
  polygon:
    mainnet-rpc: ${POLYGON_MAINNET_RPC:https://polygon-rpc.com}
    mumbai-rpc: ${POLYGON_MUMBAI_RPC:https://rpc-mumbai.maticvigil.com}

logging:
  level:
    com.blockchain: DEBUG

spring:
  config:
    activate:
      on-profile: docker
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8093

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9093}
    
blockchain:
  networks:
    ethereum-mainnet:
      rpc-url: ${ETHEREUM_MAINNET_RPC:https://eth-mainnet.g.alchemy.com/v2/demo}
      chain-id: 1
    ethereum-sepolia:
      rpc-url: ${ETHEREUM_SEPOLIA_RPC:https://eth-sepolia.g.alchemy.com/v2/demo}
      chain-id: 11155111
    polygon-mainnet:
      rpc-url: ${POLYGON_MAINNET_RPC:https://polygon-rpc.com}
      chain-id: 137
    polygon-mumbai:
      rpc-url: ${POLYGON_MUMBAI_RPC:https://rpc-mumbai.maticvigil.com}
      chain-id: 80001
    
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.wallet: DEBUG
    net.devh.boot.grpc: INFO
    org.web3j: INFO
